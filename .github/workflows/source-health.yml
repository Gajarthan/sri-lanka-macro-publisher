name: Source Health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run source healthcheck
        run: uv run python -m macro_publisher.cli healthcheck
