name: Publish Data

on:
  workflow_dispatch:
    inputs:
      source:
        description: Optional source to run
        required: false
        default: all
  schedule:
    - cron: "0 */3 * * 1-5"
    - cron: "15 1 * * *"
    - cron: "30 2 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run scheduled source
        shell: bash
        run: |
          SOURCE_INPUT="${{ github.event.inputs.source || '' }}"
          SCHEDULE="${{ github.event.schedule || '' }}"
          if [[ "$SOURCE_INPUT" == "all" || -z "$SOURCE_INPUT" ]]; then
            if [[ "$SCHEDULE" == "0 */3 * * 1-5" ]]; then
              uv run python -m macro_publisher.cli run-source cbsl_fx
            elif [[ "$SCHEDULE" == "15 1 * * *" ]]; then
              uv run python -m macro_publisher.cli run-source doa_vegetable_prices
            elif [[ "$SCHEDULE" == "30 2 * * *" ]]; then
              uv run python -m macro_publisher.cli run-source dcs_ccpi
            else
              uv run python -m macro_publisher.cli run-all
            fi
          else
            uv run python -m macro_publisher.cli run-source "$SOURCE_INPUT"
          fi

      - name: Validate repository
        run: |
          uv run ruff check src tests scripts
          uv run pytest

      - name: Generate matplotlib charts
        run: uv run python scripts/generate_charts.py

      - name: Generate report outputs
        run: |
          uv run python -m macro_publisher.cli generate-daily-report
          uv run python -m macro_publisher.cli generate-leaderboard
          uv run python -m macro_publisher.cli generate-post

      - name: Regenerate README dashboard block
        run: uv run python scripts/generate_readme_dashboard.py

      - name: Commit and push changed outputs
        shell: bash
        run: |
          if git diff --quiet -- data docs/readme-assets README.md DAILY_REPORT.md LEADERBOARD.md POST.txt; then
            echo "No published output changes to commit."
            exit 0
          fi
          COMMIT_DATE="$(date -u +%F)"
          git config user.name "Gajarthan"
          git config user.email "Gajarthan@users.noreply.github.com"
          git add data docs/readme-assets README.md DAILY_REPORT.md LEADERBOARD.md POST.txt
          git commit -m "chore(data): refresh published macro snapshots ${COMMIT_DATE}"
          git push
